<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Manager — Accesso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border-idle: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.14);
    --text-primary: #f0f0f0;
    --text-secondary: #888;
    --text-hint: #555;
    --accent-red: #ff3b3b;
    --accent-green: #2ecc71;
    --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
    color-scheme: dark;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg1);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: var(--bg2);
    border: 1px solid var(--border-idle);
    border-radius: 20px;
    padding: 40px 36px;
    width: 340px;
    max-width: 90vw;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .login-logo {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    text-align: center;
  }
  .login-logo span { color: var(--accent-red); }
  .login-subtitle {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: -12px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .form-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-hint);
  }
  .form-input {
    background: var(--bg1);
    border: 1px solid var(--border-idle);
    border-radius: 10px;
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color var(--transition);
    width: 100%;
  }
  .form-input:focus { border-color: var(--border-hover); }
  .form-input::placeholder { color: var(--text-hint); }
  .btn-login {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,59,59,0.3);
    background: rgba(255,59,59,0.08);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent-red);
    cursor: pointer;
    transition: all var(--transition);
    width: 100%;
  }
  .btn-login:hover {
    background: rgba(255,59,59,0.15);
    border-color: rgba(255,59,59,0.45);
  }
  .login-error {
    font-size: 13px;
    color: var(--accent-red);
    background: rgba(255,59,59,0.08);
    border: 1px solid rgba(255,59,59,0.22);
    border-radius: 10px;
    padding: 10px 14px;
    text-align: center;
    display: none;
  }
  .login-error.visible { display: block; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo"><span>■</span> Budget Manager</div>
  <div class="login-subtitle">Inserisci la password per accedere</div>
  <div class="form-group">
    <label class="form-label" for="pwdInput">Password</label>
    <input class="form-input" type="password" id="pwdInput" placeholder="••••••••" autocomplete="current-password">
  </div>
  <div class="login-error" id="loginError">Password errata. Riprova.</div>
  <button class="btn-login" id="btnLogin">Accedi</button>
</div>
<script>
  // Hash SHA-256 della password (la password in chiaro non è mai scritta nel codice)
  // Per cambiare password: genera il nuovo hash su https://emn178.github.io/online-tools/sha256.html
  // e sostituisci la stringa qui sotto.
  const PASSWORD_HASH = '8891cf0b687870411e7521293c0d63f0ce43d7ef523b5bd57c02733bc0c7d111'; 

  async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  if (sessionStorage.getItem('bm_auth') === '1') {
    window.location.replace('app.html');
  }

  async function tryLogin() {
    const val = document.getElementById('pwdInput').value;
    const hash = await sha256(val);
    if (hash === PASSWORD_HASH) {
      sessionStorage.setItem('bm_auth', '1');
      window.location.replace('dashboard.html');
    } else {
      document.getElementById('loginError').classList.add('visible');
      document.getElementById('pwdInput').value = '';
      document.getElementById('pwdInput').focus();
    }
  }

  document.getElementById('btnLogin').addEventListener('click', tryLogin);
  document.getElementById('pwdInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });
</script>
</body>
</html>
